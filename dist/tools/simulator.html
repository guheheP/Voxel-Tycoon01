<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧪 バランスシミュレータ — Voxel Shop Tycoon</title>
  <style>
    /* ── Base ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
      background: #0f0f1a;
      color: #e9ecef;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .app-header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .app-header h1 { font-size: 1.2rem; color: #74c0fc; }
    .app-header p  { font-size: 0.8rem; color: #868e96; }

    .app-body {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      gap: 4px;
      border-bottom: 2px solid rgba(255,255,255,0.08);
      margin-bottom: 24px;
    }
    .tab-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #868e96;
      font-size: 0.95rem;
      padding: 10px 18px;
      cursor: pointer;
      margin-bottom: -2px;
      transition: all 0.15s;
    }
    .tab-btn:hover { color: #ced4da; }
    .tab-btn.active {
      color: #74c0fc;
      border-bottom-color: #4dabf7;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Form ── */
    .sim-section {
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .sim-section h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #868e96;
      margin-bottom: 14px;
    }
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 12px;
    }
    .form-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 140px;
    }
    .form-field label {
      font-size: 0.75rem;
      color: #868e96;
      font-weight: 600;
      text-transform: uppercase;
    }
    .form-field select,
    .form-field input[type="number"] {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: #e9ecef;
      font-size: 0.88rem;
      padding: 7px 10px;
    }
    .form-field select:focus,
    .form-field input:focus {
      outline: none;
      border-color: #4dabf7;
    }
    .check-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .check-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.85rem;
      color: #ced4da;
      cursor: pointer;
      padding: 5px 10px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
    }
    .check-label input { accent-color: #4dabf7; }

    .run-btn {
      background: linear-gradient(135deg, #4dabf7, #339af0);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 10px 24px;
      cursor: pointer;
      transition: filter 0.15s;
      margin-top: 4px;
    }
    .run-btn:hover { filter: brightness(1.1); }
    .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Results ── */
    .result-section {
      display: none;
    }
    .stat-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 10px 16px;
      min-width: 110px;
    }
    .stat-label {
      font-size: 0.7rem;
      color: #868e96;
      text-transform: uppercase;
    }
    .stat-value {
      font-size: 1.3rem;
      font-weight: 700;
      margin-top: 2px;
    }

    canvas {
      display: block;
      width: 100%;
      max-width: 700px;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.06);
    }
  </style>
  <script type="module" crossorigin src="/Voxel-Tycoon01/assets/simulator-BzhbsVez.js"></script>
  <link rel="modulepreload" crossorigin href="/Voxel-Tycoon01/assets/adventurers-B9IAzgqq.js">
</head>
<body>
  <header class="app-header">
    <div>
      <h1>🧪 バランスシミュレータ</h1>
      <p>Voxel Shop Tycoon — ゲームバランス調整ツール</p>
    </div>
  </header>

  <main class="app-body">
    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="battle">⚔️ バトル</button>
      <button class="tab-btn" data-tab="explore">🗺️ 探索</button>
      <button class="tab-btn" data-tab="economy">💰 経済</button>
    </nav>

    <!-- ── Battle Tab ── -->
    <section id="tab-battle" class="tab-content active">
      <div class="sim-section">
        <h3>パラメータ設定</h3>
        <div class="form-row">
          <div class="form-field" style="min-width:220px">
            <label>ボス</label>
            <select id="boss-select"></select>
          </div>
          <div class="form-field">
            <label>レベル</label>
            <input type="number" id="battle-level" value="1" min="1" max="10">
          </div>
          <div class="form-field">
            <label>武器品質</label>
            <input type="number" id="battle-weaponq" value="0" min="0" max="100">
          </div>
          <div class="form-field">
            <label>試行回数</label>
            <select id="battle-iter">
              <option value="100">100</option>
              <option value="200" selected>200</option>
              <option value="500">500</option>
              <option value="1000">1000</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-field" style="flex:1">
            <label>冒険者</label>
            <div class="check-group" id="adv-checkboxes"></div>
          </div>
        </div>
        <button class="run-btn" id="battle-run">▶ シミュレート</button>
      </div>
      <div class="sim-section result-section" id="battle-results">
        <h3>シミュレーション結果</h3>
        <div class="stat-grid" id="battle-stats"></div>
        <canvas id="battle-canvas" width="700" height="200"></canvas>
      </div>
    </section>

    <!-- ── Explore Tab ── -->
    <section id="tab-explore" class="tab-content">
      <div class="sim-section">
        <h3>パラメータ設定</h3>
        <div class="form-row">
          <div class="form-field" style="min-width:200px">
            <label>エリア</label>
            <select id="explore-area"></select>
          </div>
          <div class="form-field">
            <label>冒険者</label>
            <select id="explore-adv"></select>
          </div>
          <div class="form-field">
            <label>レベル</label>
            <input type="number" id="explore-level" value="1" min="1" max="10">
          </div>
          <div class="form-field">
            <label>武器品質</label>
            <input type="number" id="explore-weaponq" value="0" min="0" max="100">
          </div>
        </div>
        <button class="run-btn" id="explore-run">▶ シミュレート</button>
      </div>
      <div class="sim-section result-section" id="explore-results">
        <h3>シミュレーション結果</h3>
        <div class="stat-grid" id="explore-stats"></div>
        <canvas id="explore-canvas" width="700" height="200"></canvas>
      </div>
    </section>

    <!-- ── Economy Tab ── -->
    <section id="tab-economy" class="tab-content">
      <div class="sim-section">
        <h3>パラメータ設定</h3>
        <div class="form-row">
          <div class="form-field" style="min-width:180px">
            <label>エリア</label>
            <select id="econ-area"></select>
          </div>
          <div class="form-field">
            <label>冒険者</label>
            <select id="econ-adv"></select>
          </div>
          <div class="form-field">
            <label>冒険者数</label>
            <input type="number" id="econ-num-advs" value="2" min="1" max="5">
          </div>
          <div class="form-field">
            <label>レベル</label>
            <input type="number" id="econ-level" value="1" min="1" max="10">
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label>武器品質</label>
            <input type="number" id="econ-weaponq" value="0" min="0" max="100">
          </div>
          <div class="form-field">
            <label>調合売上/日 (G)</label>
            <input type="number" id="econ-craft" value="0" min="0">
          </div>
          <div class="form-field">
            <label>現在ランク</label>
            <select id="econ-rank"></select>
          </div>
          <div class="form-field">
            <label>シミュレーション日数</label>
            <select id="econ-days">
              <option value="14">14日</option>
              <option value="30" selected>30日</option>
              <option value="60">60日</option>
              <option value="90">90日</option>
            </select>
          </div>
        </div>
        <button class="run-btn" id="econ-run">▶ シミュレート</button>
      </div>
      <div class="sim-section result-section" id="econ-results">
        <h3>シミュレーション結果</h3>
        <div class="stat-grid" id="econ-stats"></div>
        <canvas id="econ-canvas" width="700" height="220"></canvas>
      </div>
    </section>
  </main>

</body>
</html>
